name: G2B Auto Collector

on:
  schedule:
    - cron: "17 23 * * *"  # UTC 23:17 = KST 08:17 (정시 혼잡 회피, 하루 1회)
  workflow_dispatch:
    inputs:
      skip_connection_test:
        description: "연결 테스트 건너뛰기"
        required: false
        default: false
        type: boolean
      force_api_reset:
        description: "API 호출 카운트 강제 리셋 (주의)"
        required: false
        default: false
        type: boolean
      reset_progress:
        description: "진행 위치 리셋 (시작 연도-월 입력, 예: 2016-02 / 비워두면 리셋 안 함)"
        required: false
        default: ""
        type: string

jobs:
  g2b-job:
    runs-on: ubuntu-latest
    timeout-minutes: 120 # 무한 루프 방지

    env:
      # GitHub Secrets에서 가져옴
      API_KEY: ${{ secrets.API_KEY }}
      SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # 파이썬 경로 설정 (매우 중요: utils 모듈 인식용)
      PYTHONPATH: ${{ github.workspace }}
      TZ: Asia/Seoul

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 🗄️ DB 테이블 생성 (없으면 생성, 있으면 무시)
      - name: Create DB Table
        run: |
          python -c "
          from utils.db import create_table
          create_table()
          print('✅ contracts 테이블 준비 완료')
          "

      # 🧪 연결 테스트 (G2B API)
      - name: Connection Tests
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_connection_test }}
        run: |
          echo "🧪 시스템 연결 테스트..."
          python -c "
          import os
          from utils.g2b_client import G2BClient

          print('📡 G2B API 연결 테스트...')
          try:
              api_key = os.getenv('API_KEY')
              if not api_key:
                  print('⚠️ API_KEY가 없어 G2B 테스트 건너뜀')
              else:
                  client = G2BClient(api_key)
                  if not client.test_connection():
                      print('⚠️ G2B API 연결 실패 (429 등 일시 오류일 수 있음, 수집은 계속 진행)')
                  else:
                      print('✅ G2B API 연결 성공')
          except Exception as e:
              print(f'⚠️ G2B API 테스트 중 오류: {e} (수집은 계속 진행)')

          print('✅ 연결 테스트 완료')
          "
        continue-on-error: true

      # 🔄 (선택) API 카운트 강제 리셋
      - name: Force Reset API Count
        if: ${{ inputs.force_api_reset }}
        run: |
          python -c "
          from utils.db import load_progress, save_progress
          progress = load_progress()
          progress['daily_api_calls'] = 0
          save_progress(progress)
          print('🔄 API 카운트 0으로 초기화됨')
          "

      # 🔄 (선택) 수집 시작 위치 리셋 (예: "2016-02")
      - name: Reset Progress Position
        if: ${{ inputs.reset_progress != '' }}
        run: |
          python -c "
          import sys
          from utils.db import load_progress, save_progress

          raw = '${{ inputs.reset_progress }}'.strip()
          try:
              year_str, month_str = raw.split('-')
              year = int(year_str)
              month = int(month_str)
              assert 2000 <= year <= 2030 and 1 <= month <= 12
          except Exception:
              print(f'❌ 잘못된 형식: {raw!r}. 예시: 2016-02')
              sys.exit(1)

          # 기존 total_collected 보존 (리셋해도 누적 건수는 유지)
          prev_total = load_progress().get('total_collected', 0)

          new_progress = {
              'current_job': '물품',
              'current_year': year,
              'current_month': month,
              'daily_api_calls': 0,
              'total_collected': prev_total,
              'last_run_date': ''
          }
          save_progress(new_progress)
          print(f'🔄 진행 위치 리셋 완료: 물품 {year}년 {month}월부터 시작')
          "

      # 🚀 메인 수집기 실행 (로그 파일에 기록하며 실행)
      - name: Run G2B Collector
        id: run_collector
        timeout-minutes: 110
        run: |
          set -o pipefail
          echo "🚀 G2B 수집 시작..."
          echo "⏰ 시작 시간: $(date '+%Y-%m-%d %H:%M:%S %Z')"

          # 표준 출력을 화면과 파일(collection.log)에 동시에 기록
          python collectors/g2b/collect_all.py 2>&1 | tee collection.log
          collector_exit=${PIPESTATUS[0]}

          if [ "$collector_exit" -eq 0 ]; then
            echo "✅ 수집 완료"
            echo "collector_status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ 수집 실패 또는 타임아웃 (종료 코드: $collector_exit)"
            echo "collector_status=failed" >> $GITHUB_OUTPUT
          fi

          echo "⏰ 종료 시간: $(date '+%Y-%m-%d %H:%M:%S %Z')"
        continue-on-error: true

      # 🚨 실패/타임아웃 시 상세 Slack 알림
      - name: Notify Failure
        if: always() && steps.run_collector.outputs.collector_status == 'failed'
        run: |
          python -c "
          from utils.slack import send_slack_message
          from utils.db import load_progress, get_connection
          from datetime import datetime

          run_url = 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          timestamp = datetime.now().strftime('%Y-%m-%d %H:%M:%S KST')

          # 타임아웃 여부 판단 (collection.log에 수집 데이터가 있으면 타임아웃으로 간주)
          is_timeout = False
          try:
              with open('collection.log', 'r', encoding='utf-8') as f:
                  content = f.read()
                  if 'DB insert' in content or 'insert' in content.lower():
                      is_timeout = True
          except:
              pass

          if is_timeout:
              try:
                  progress = load_progress()
                  daily_api = progress.get('daily_api_calls', 0)
                  total = progress.get('total_collected', 0)
                  cur_job = progress.get('current_job', '-')
                  cur_year = progress.get('current_year', '-')
                  cur_month = progress.get('current_month', '-')
                  conn = get_connection()
                  with conn.cursor() as c:
                      c.execute('SELECT bsns_div_nm, MAX(collected_year * 100 + collected_month), COUNT(*) FROM contracts GROUP BY bsns_div_nm ORDER BY bsns_div_nm')
                      job_rows = c.fetchall()
                  conn.close()
                  job_lines = '\n'.join(f'  • {r[0]}: ~{r[1]//100}년 {r[1]%100}월 ({r[2]:,}건)' for r in job_rows)
                  message = f'⏰ 타임아웃으로 종료 (정상)\n\n수집 중 110분 제한 도달 — 다음 실행에서 이어서 수집합니다.\n⏰ 시간: {timestamp}\n\n📊 API 사용: {daily_api}/1000회\n📦 총 누적: {total:,}건\n📍 다음 시작 위치: {cur_job} {cur_year}년 {cur_month}월\n\n📋 종류별 완료 구간:\n{job_lines}\n\n🔗 로그: {run_url}'
              except Exception as e:
                  message = f'⏰ 타임아웃으로 종료 (정상)\n\n수집 중 110분 제한 도달 — 다음 실행에서 이어서 수집합니다.\n⏰ 시간: {timestamp}\n🔗 로그: {run_url}'
          else:
              message = f'🚨 GitHub Actions 실패\n\n⏰ 시간: {timestamp}\n🔗 로그: {run_url}\n\n로그를 확인해주세요.'

          send_slack_message(message)
          " || echo "⚠️ Slack 알림 전송 실패 (계속 진행)"
        continue-on-error: true

      # 📂 로그 아티팩트 저장 (디버깅용)
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-logs
          path: |
            collection.log
            progress_backup.json
          retention-days: 5
          # ⚠️ 주의: service_account.json은 절대 올리지 않음!

